<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF0A0" />
      <stop offset="35%" stop-color="#F5C242" />
      <stop offset="85%" stop-color="#E5A715" />
      <stop offset="100%" stop-color="#B87D00" />
    </linearGradient>
    <linearGradient id="glowGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5C242" stop-opacity="0.4" />
      <stop offset="100%" stop-color="#000000" stop-opacity="0" />
    </linearGradient>
    <radialGradient id="bgGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2212" />
      <stop offset="100%" stop-color="#090807" />
    </radialGradient>
    <filter id="glowEffect" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Squircle Outer Container -->
  <rect x="16" y="16" width="480" height="480" rx="108" fill="url(#bgGlow)" stroke="#383020" stroke-width="6" />

  <!-- Outer Film Reel Wheel Border -->
  <circle cx="256" cy="256" r="190" fill="none" stroke="url(#goldGrad)" stroke-width="12" filter="url(#glowEffect)" opacity="0.9" />

  <!-- Film Reel Perforations / Spoke Accents -->
  <circle cx="256" cy="100" r="14" fill="url(#goldGrad)" opacity="0.8" />
  <circle cx="256" cy="412" r="14" fill="url(#goldGrad)" opacity="0.8" />
  <circle cx="100" cy="256" r="14" fill="url(#goldGrad)" opacity="0.8" />
  <circle cx="412" cy="256" r="14" fill="url(#goldGrad)" opacity="0.8" />
  <circle cx="145" cy="145" r="12" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="367" cy="145" r="12" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="145" cy="367" r="12" fill="url(#goldGrad)" opacity="0.6" />
  <circle cx="367" cy="367" r="12" fill="url(#goldGrad)" opacity="0.6" />

  <!-- Inner Glowing Film Reel Ring -->
  <circle cx="256" cy="256" r="140" fill="none" stroke="url(#goldGrad)" stroke-width="6" stroke-dasharray="16 12" opacity="0.7" />

  <!-- Central Futuristic 3D Starburst Lightning Emblem -->
  <g filter="url(#glowEffect)">
    <!-- 8-Point AI Starburst -->
    <path d="M 256 120 L 272 210 L 362 170 L 295 235 L 392 256 L 295 277 L 362 342 L 272 302 L 256 392 L 240 302 L 150 342 L 217 277 L 120 256 L 217 235 L 150 170 L 240 210 Z" fill="url(#goldGrad)" />
    <!-- Dynamic Lightning Overlay S Slash -->
    <path d="M 285 170 L 200 280 L 260 280 L 225 345 L 310 235 L 250 235 Z" fill="#FFFFFF" opacity="0.9" />
  </g>
</svg>